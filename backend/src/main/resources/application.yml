server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: siseradar

springdoc:
  swagger-ui:
    path: /swagger-ui.html

siseradar:
  datagokr:
    base-url: https://apis.data.go.kr/1613000/RTMSDataSvcAptTrade
    service-key: ${DATA_GO_KR_SERVICE_KEY}
  collection:
    lawd-codes: 41135
    recent-months: 2
    num-of-rows: 100
    page-delay-ms: 200
    cron: "0 0 4 * * *"
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

---
# Default profile — local dev on in-memory H2
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:siseradar;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

---
# Prod profile — PostgreSQL via environment variables
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

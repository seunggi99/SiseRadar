server:
  # Railway/Heroku는 PORT를 주입 → 그걸 우선 사용. 로컬은 SERVER_PORT(없으면 8080).
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: siseradar

springdoc:
  swagger-ui:
    path: /swagger-ui.html

siseradar:
  datagokr:
    base-url: https://apis.data.go.kr/1613000
    service-key: ${DATA_GO_KR_SERVICE_KEY}
    service-key-decoding: ${DATA_GO_KR_SERVICE_DECODING_KEY:}
  kakao:
    rest-key: ${KAKAO_REST_API_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  collection:
    lawd-codes: 41135
    recent-months: 2
    # data.go.kr 한 페이지 최대 행수. 크게 잡아 페이지네이션 콜 수를 줄임(일일 API 쿼터 절약).
    num-of-rows: 1000
    page-delay-ms: 200
    cron: "0 0 4 * * *"
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    # Used as raw UTF-8 key bytes; the dev fallback is only for local/test without .env.
    secret: ${JWT_SECRET:siseradar-local-dev-secret-change-me-please-0123456789}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

---
# Default profile — local dev on in-memory H2
spring:
  config:
    activate:
      on-profile: default
  datasource:
    # File-mode H2 so collected data survives restarts (stored under backend/data/).
    url: jdbc:h2:file:./data/siseradar;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

---
# Prod profile — PostgreSQL via environment variables.
# Railway/Heroku의 DATABASE_URL(postgres://…)은 RailwayDatabaseUrlProcessor가 jdbc로 변환해
# spring.datasource.*를 최우선 주입하므로 아래 값은 폴백(이미 jdbc면 그대로 사용).
# 마이그레이션 도구가 없고 클라우드 DB가 비어 시작하므로 ddl-auto=update로 스키마 생성.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update

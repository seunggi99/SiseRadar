server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: siseradar

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# Default profile — local dev on in-memory H2
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:siseradar;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

---
# Prod profile — PostgreSQL via environment variables
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
